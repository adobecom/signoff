name: Mention Trigger

on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]

jobs:
  dispatch:
    if: contains(github.event.comment.body, '@AgentTed')
    runs-on: ubuntu-latest
    steps:
      # Use github-script so user-controlled comment body is never interpolated
      # into a shell command (fixes CVE: command injection via comment content).
      - name: Send Payload
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GH_TOKEN }}
          script: |
            await github.rest.repos.createDispatchEvent({
              owner: 'AgentTed',
              repo: 'bot',
              event_type: 'mention_trigger',
              client_payload: {
                comment_body: context.payload.comment.body,
                author: context.payload.comment.user.login,
                html_url: context.payload.comment.html_url,
                issue_title: context.payload.issue?.title || ''
              }
            });