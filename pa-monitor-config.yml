# PA monitor configuration (pa-monitor-config.yml)
# PA codes and page paths: keep aligned with pa-monitor-config.js (Playwright imports the JS file).
# Tier 1 PA core matrix: pa-monitor-config.js → tier1Locales; optional per-row pageKeys (default: plans + catalog; ROW catalog-only uses ['catalog']).
# Used by CircleCI (tier2) and as documentation for plans/teams specs.
#
# Phase 2 (post ROW migration): add osi_codes per locale, consolidate row_spec -> spec

pages:
  plans:
    spec: plans/pa-core-monitor.spec.js       # US — PA-scoped monitor2-style flow (see pa-monitor-config.js)
    row_spec: plans/pa-core-monitor.spec.js   # ROW — same spec (override in JS monitorPages.plans.rowSpec if needed)
    us_path: /creativecloud/plans.html
    row_path: /creativecloud/plans.html
  catalog:
    spec: plans/pa-core-monitor.spec.js
    row_spec: plans/pa-core-monitor.spec.js
    us_path: /products/catalog.html
    row_path: /products/catalog.html
  teams:
    spec: teams/monitor-core.spec.js        # TBD — align with plans approach
    row_spec: teams/monitor_row.spec.js
    us_path: /creativecloud/business/teams.html
    row_path: /creativecloud/business/teams.html

# PA offer codes to monitor.
# The spec finds every reference to each code on the page (all tabs, banners,
# comparison sections) and validates price rendering + commerce CTA chain.
offer_codes:
  - pa: ccsn_direct_individual
    label: CC Pro
  - pa: ccle_direct_indirect_team
    label: CC Pro Business
  - pa: phsp_direct_individual
    label: Photoshop
  - pa: apcc_direct_individual
    label: Acrobat Pro
  - pa: PA-128
    label: Photography

